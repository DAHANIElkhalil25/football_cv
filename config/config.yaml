project:
  name: football_cv
  author: Elkhalil DAHANI
  institute: INSEA
  period: "PFE 2025-2026"

paths:
  root: "./"
  raw_data: "./data/raw/soccernet"
  processed_data: "./data/processed"
  dataset_yaml: "./data/processed/soccernet.yaml"
  bytetrack_cfg: "./config/bytetrack.yaml"
  output_runs: "./runs"

soccernet:
  splits:
    - train
    - test
  download_videos: false
  force_redownload: false

conversion:
  splits_mapping:
    train: train
    test: test
  image_width: 1920
  image_height: 1080
  sampling_step: 3
  min_visibility: 0.2
  min_bbox_px: 10

training:
  model_name: yolov8m.pt
  run_name: yolov8m_soccernet
  epochs: 50
  imgsz: 1280
  batch: 8
  device: auto
  lr0: 0.003
  lrf: 0.01
  weight_decay: 0.0005
  workers: 8
  patience: 15
  pretrained: true
  augment:
    hsv_h: 0.015
    hsv_s: 0.7
    hsv_v: 0.4
    scale: 0.5
    fliplr: 0.5
    mosaic: 1.0
    mixup: 0.1

targets:
  map50_player: 0.75
  map50_ball: 0.70
  recall: 0.80
